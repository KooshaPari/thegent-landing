# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  RUNTIME: bun

tasks:
  default:
    desc: Run the standard Bun/Astro validation task
    cmds:
      - task: test

  build:
    desc: Build the Bun/Astro site
    summary: Uses the detected Bun package manager and Astro build script.
    cmds:
      - "{{.RUNTIME}} run build"

  test:
    desc: Run site validation checks for the Bun/Astro project
    cmds:
      - task: lint
      - task: build

  lint:
    desc: Run Astro diagnostics and TypeScript checks
    summary: The repo does not define a dedicated lint script, so Astro check is the canonical validation command.
    cmds:
      - "{{.RUNTIME}}x astro check"

  clean:
    desc: Remove generated build artifacts
    cmds:
      - git clean -fdX -- dist .astro
