version: "3"

tasks:
  default:
    desc: Build the Bun/Astro site
    cmds:
      - task: build

  build:
    desc: Build the Bun/Astro site
    cmds:
      - bun run build

  test:
    desc: Run site validation checks
    cmds:
      - task: lint
      - task: build

  lint:
    desc: Run Astro diagnostics and TypeScript checks
    cmds:
      - bunx astro check

  clean:
    desc: Remove generated build artifacts
    cmds:
      - git clean -fdX -- dist .astro
